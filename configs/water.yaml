# Configuration for liquid water / aqueous systems
# Long-range module enabled for H-bond cooperative effects

model:
  n_species: 100
  n_blocks: 4
  scalar_dim: 128
  irreps: "128x0e + 64x1o + 32x2e"
  l_max: 2
  n_basis: 8
  local_cutoff: 5.5
  lr_cutoff: 12.0
  long_range_type: invariant_attention
  n_heads: 4
  avg_neighbors: 25.0

train:
  device: cpu
  n_epochs: 1000
  lr: 3.0e-4
  lr_min: 1.0e-6
  weight_decay: 1.0e-5
  batch_size: 4
  val_fraction: 0.10
  test_fraction: 0.05
  patience: 100
  w_energy: 1.0
  w_force: 3.0
  w_stress: 0.0

data:
  train_file: data/water.extxyz
  output_dir: outputs/water_run
