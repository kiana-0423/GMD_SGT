# Stage 1: lightweight Allegro-style local backbone

model:
  type: AllegroStyleBackbone
  n_species: 100
  hidden_channels: 64
  num_layers: 2
  n_basis: 8
  cutoff: 5.0
  l_max: 2
  avg_neighbors: 12.0

train:
  device: cpu
  seed: 42
  n_epochs: 200
  lr: 3.0e-4
  lr_min: 3.0e-6
  weight_decay: 1.0e-5
  max_grad_norm: 1.0
  warmup_steps: 200
  batch_size: 4
  val_fraction: 0.10
  test_fraction: 0.00
  patience: 30
  w_energy: 1.0
  w_force: 1.0
  w_stress: 0.0
  energy_loss: mae
  force_loss: rmse
  dry_run: false
  dry_run_frames: 12

data:
  train_file: data/train.extxyz
  output_dir: outputs/stage1_backbone
  units:
    energy: eV
    force: eV/Angstrom
    length: Angstrom
